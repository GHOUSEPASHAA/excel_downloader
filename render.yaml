services:
  - type: web
    name: excel-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update
      apt-get install -y unixodbc unixodbc-dev curl gnupg
      curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
      install -o root -g root -m 644 microsoft.gpg /usr/share/keyrings/
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/20.04/prod focal main" > /etc/apt/sources.list.d/mssql-release.list
      apt-get update
      ACCEPT_EULA=Y apt-get install -y msodbcsql18
    startCommand: gunicorn app:app
